name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check src tests api

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project + dev/api extras
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev,api]"
      - name: Run pytest
        env:
          HEART_DISEASE_FAST_TRAIN: "1"
        run: pytest --cov=heart_disease_mlops --cov-report=term-missing
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: |
            artifacts/
            mlruns/

  train-smoke:
    name: Training smoke run
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run training (fast mode)
        env:
          HEART_DISEASE_FAST_TRAIN: "1"
          HEART_DISEASE_EXPERIMENT_NAME: "ci-flow"
        run: python -m heart_disease_mlops
      - name: Upload trained artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            artifacts/
            mlruns/

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: train-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Train model for image
        env:
          HEART_DISEASE_FAST_TRAIN: "1"
          HEART_DISEASE_EXPERIMENT_NAME: "ci-flow"
        run: |
          pip install -r requirements.txt
          pip install -e .
          python -m heart_disease_mlops
      - name: Build container image with Docker (Containerfile is OCI-compatible)
        run: docker build -f Containerfile -t heart-disease-api:ci .
      - name: Smoke test container
        run: |
          docker run -d --name api -p 8000:8000 heart-disease-api:ci
          sleep 8
          curl --fail --retry 5 --retry-delay 2 http://localhost:8000/health
          curl --fail -X POST http://localhost:8000/predict \
            -H 'Content-Type: application/json' \
            -d @api/example_requests.json | head -c 500 || true
          docker logs api
          docker rm -f api
