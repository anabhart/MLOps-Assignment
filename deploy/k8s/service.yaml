apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api
  namespace: heart-disease
  labels:
    app: heart-disease-api
spec:
  type: LoadBalancer  # Falls back to NodePort on bare clusters; use port-forward locally.
  selector:
    app: heart-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
