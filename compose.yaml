# Compose stack: MLflow tracking server + Heart Disease API.
#
# Bring up:    make compose-up        (or `docker compose up -d --build` /
#                                       `podman-compose up -d --build`)
# Tear down:   make compose-down
#
# Endpoints after `up`:
#   - MLflow UI:        http://localhost:5000
#   - Prediction UI:    http://localhost:8000/ui
#   - Swagger:          http://localhost:8000/docs
#   - Prometheus:       http://localhost:8000/metrics
#   - Prometheus server: http://localhost:9090
#   - Grafana:          http://localhost:3000  (admin/admin)
#
# Traces emitted from the API land in MLflow under the
# `heart-disease-serving` experiment because the `api` service is
# configured with MLFLOW_SERVER_URI=http://mlflow:5000.

name: heart-disease

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.0.0
    container_name: heart-disease-mlflow
    user: "${UID:-1000}:${GID:-1000}"
    command: >-
      mlflow server
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/mlruns
      --serve-artifacts
      --artifacts-destination /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Containerfile
    image: heart-disease-api:latest
    container_name: heart-disease-api
    # Run as the host user so bind-mounted volumes
    # (./data/feedback, ./artifacts) remain writable. Falls back to the
    # container's `appuser` (uid 1000) when UID/GID are not exported.
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_SERVER_URI: http://mlflow:5000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      HEART_DISEASE_MODEL_PATH: /app/artifacts/models/best_model.joblib
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./mlruns:/mlflow/mlruns
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: heart-disease-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: heart-disease-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

# No named volumes required: MLflow state is persisted in ./mlruns.
volumes:
  prometheus_data:
  grafana_data:
